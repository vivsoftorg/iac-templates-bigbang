addons:
  keycloak:
    # -- Toggle deployment of Keycloak.
    enabled: false
    # -- Choose source type of "git" or "helmRepo"
    sourceType: "helmRepo"
    git:
      repo: https://repo1.dso.mil/big-bang/product/packages/keycloak.git
      path: "./chart"
      tag: "7.1.8-bb.0"
    helmRepo:
      repoName: "registry1"
      chartName: "keycloak"
      tag: "7.1.8-bb.0"
    database:
      # -- Hostname of a pre-existing database to use for Keycloak.
      # Entering connection info will disable the deployment of an internal database and will auto-create any required secrets.
      host: ""
      # -- Pre-existing database type (e.g. postgres) to use for Keycloak.
      type: postgres
      # -- Port of a pre-existing database to use for Keycloak.
      port: 5432
      # -- Database name to connect to on host.
      database: "" # example: keycloak
      # -- Username to connect as to external database, the user must have all privileges on the database.
      username: ""
      # -- Database password for the username used to connect to the existing database.
      password: ""
    # -- Flux reconciliation overrides specifically for the OPA Gatekeeper Package
    flux: {}
    # -- Redirect the package ingress to a specific Istio Gateway (listed in `istio.gateways`).  The default is "public".
    ingress:
      # the istio gateway for keycloak must have tls.mode: PASSTHROUGH
      gateway: ""
      # -- Certificate/Key pair to use as the certificate for exposing Keycloak
      # Setting the ingress cert here will automatically create the volume and volumemounts in the Keycloak Package chart
      key: ""
      cert: ""
    # -- Values to passthrough to the keycloak chart: https://repo1.dso.mil/big-bang/product/packages/keycloak.git;
    # WARNING: The upstream keycloak chart has some limitations on certain keys
    # due to its templating architecture. Some of the offending keys are
    # `extraEnv`, `extraEnvFrom`, `extraVolumeMounts`, and `extraVolumes`.
    # These keys are set as strings when installing the chart, so subsequent
    # overrides aren't merged with existing values: they simply replace them.
    # This means that if you set any of these keys in your overrides, you must
    # include all the existing values you wish to keep from [Big Bang's overrides](https://repo1.dso.mil/big-bang/bigbang/-/blob/master/chart/templates/keycloak/values.yaml?ref_type=heads)
    # in addition to your own.
    values: {}
    # -- Post Renderers.  See docs/postrenders.md
    postRenderers: []
